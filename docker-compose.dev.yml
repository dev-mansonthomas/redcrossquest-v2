name: rcq

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: rcq_backend
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
      - backend-cache:/root/.cache
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - RCQ_DB_HOST=rcq_mysql  # Connect directly to MySQL container
      - RCQ_DB_PORT=3306       # Internal Docker port, not external 3316
    command: uvicorn src.main:app --host 0.0.0.0 --port 8010 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rcq_default  # Same network as MySQL

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rcq_frontend
    ports:
      - "4210:4210"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Exclude node_modules from volume
      - frontend-cache:/root/.npm
    environment:
      - NODE_ENV=development
      - CI=true
    command: ng serve --host 0.0.0.0 --port 4210 --poll 2000
    networks:
      - rcq_default  # Same network as MySQL

networks:
  rcq_default:
    external: true  # Use the network created by superset/docker-compose.yml

volumes:
  backend-cache:
  frontend-cache:


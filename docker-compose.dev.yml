name: rcq

services:
  # -------------------------------------------------------
  # Valkey 9 (valkey-bundle: Redis-compatible + JSON module)
  # Shared by Superset (DB 1) and Backend (DB 0, future)
  # Must start BEFORE superset/docker-compose.yml
  # -------------------------------------------------------
  valkey:
    image: valkey/valkey-bundle
    container_name: rcq_valkey
    ports:
      - "6389:6379"  # External 6389 to avoid conflict with CLEF on 6379
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - rcq_default

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: rcq_backend
    ports:
      - "8010:8010"
    volumes:
      - ./backend:/app
      - backend-cache:/root/.cache
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - RCQ_DB_HOST=rcq_mysql  # Connect directly to MySQL container
      - RCQ_DB_PORT=3306       # Internal Docker port, not external 3316
      - SUPERSET_URL=http://rcq_superset:8088
      - VALKEY_HOST=rcq_valkey
      - VALKEY_PORT=6379       # Internal Docker port, not external 6389
      - VALKEY_DB=0
    command: uvicorn src.main:app --host 0.0.0.0 --port 8010 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rcq_default  # Same network as MySQL

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: rcq_frontend
    ports:
      - "4210:4210"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # Exclude node_modules from volume
      - frontend-cache:/root/.npm
    environment:
      - NODE_ENV=development
      - CI=true
    command: ng serve --host 0.0.0.0 --port 4210 --poll 2000
    networks:
      - rcq_default  # Same network as MySQL

networks:
  rcq_default:
    external: true
    # Created by run_local.sh before any compose up
    # Shared between docker-compose.dev.yml and superset/docker-compose.yml

volumes:
  backend-cache:
  frontend-cache:
  valkey_data:

